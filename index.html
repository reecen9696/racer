<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NIGHT DRIFT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #game { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
    :root { --pix: ui-monospace, 'SF Mono', Menlo, monospace; }

    #hud { position: fixed; inset: 0; pointer-events: none; font-family: var(--pix); color: #cfd2e8; text-shadow: 1px 1px 0 #000, 2px 2px 0 rgba(0,0,0,.6); }
    #hud-score { position: absolute; top: 22px; right: 28px; text-align: right; }
    #hud-total { font-size: 34px; letter-spacing: 2px; color: #ffd28a; }
    #hud-chain-row { font-size: 18px; margin-top: 2px; color: #7fd4ff; opacity: 0; transition: opacity .2s; }
    #hud-mult { color: #ff9d5c; }
    #hud-toast { position: absolute; top: 26%; left: 50%; transform: translateX(-50%); font-size: 22px; letter-spacing: 3px; opacity: 0; transition: opacity .25s; }
    #hud-toast.show { opacity: 1; }
    #hud-toast.good { color: #a5ffb0; }
    #hud-toast.bad { color: #ff7a6b; }
    #hud-gauge { position: absolute; bottom: 22px; left: 24px; width: 200px; height: 200px; }
    #hud-players { margin-top: 12px; font-size: 12px; color: #9aa1c4; letter-spacing: 1px; }
    #hud-players div { display: flex; justify-content: flex-end; gap: 14px; line-height: 1.9; }
    #hud-players div span { color: #7c86ad; min-width: 56px; text-align: right; }
    #hud-players div.me { color: #ffd28a; }
    #hud-players div.me span { color: #ffd28a; }
    #hud-help { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #62688a; letter-spacing: 1px; }

    #debug-panel { position: fixed; top: 12px; left: 12px; width: 320px; max-height: 92vh; overflow-y: auto; background: rgba(6,8,18,.92); border: 1px solid #2a2f4a; padding: 10px 12px; font-family: var(--pix); font-size: 11px; color: #aeb3d0; z-index: 20; }
    #debug-panel .dbg-title { color: #ffd28a; margin-bottom: 8px; letter-spacing: 2px; }
    #debug-panel .dbg-row { display: grid; grid-template-columns: 110px 1fr 44px; gap: 6px; align-items: center; margin: 3px 0; }
    #debug-panel input[type=range] { width: 100%; accent-color: #b8743a; height: 12px; }
    #debug-panel span { text-align: right; color: #7fd4ff; }

    #join { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px; background: #05060d url('/join-bg.png') center / cover no-repeat; font-family: var(--pix); z-index: 30; }
    #join .spacer { flex: 0 0 30vh; } /* the artwork carries the title — push the form below it */
    #join .row { display: flex; gap: 10px; align-items: center; color: #aeb3d0; font-size: 13px; }
    #join input { background: #0a0d1f; border: 1px solid #2a2f4a; color: #cfd2e8; padding: 8px 10px; font-family: var(--pix); font-size: 14px; width: 180px; }
    #join .colors { display: flex; gap: 8px; }
    #join .colors button { width: 34px; height: 34px; border: 2px solid #2a2f4a; cursor: pointer; }
    #join .colors button.sel { border-color: #ffd28a; }
    #join #start { background: #35204f; color: #cbb8ef; border: 1px solid #5a3f82; padding: 12px 44px; font-family: var(--pix); font-size: 17px; letter-spacing: 4px; cursor: pointer; margin-top: 8px; }
    #join #start:hover { background: #4a2d71; color: #e6dcff; }
    #join .status { color: #62688a; font-size: 11px; height: 14px; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script type="module" src="/src/client/main.ts"></script>
</body>
</html>
