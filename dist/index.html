<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NIGHT DRIFT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #game { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
    :root { --pix: ui-monospace, 'SF Mono', Menlo, monospace; }

    #hud { position: fixed; inset: 0; pointer-events: none; font-family: var(--pix); color: #cfd2e8; text-shadow: 1px 1px 0 #000, 2px 2px 0 rgba(0,0,0,.6); }
    #hud-score { position: absolute; top: 22px; right: 28px; text-align: right; }
    #hud-total { font-size: 34px; letter-spacing: 2px; color: #ffd28a; }
    #hud-chain-row { font-size: 18px; margin-top: 2px; color: #7fd4ff; opacity: 0; transition: opacity .2s; }
    #hud-mult { color: #ff9d5c; }
    #hud-toast { position: absolute; top: 26%; left: 50%; transform: translateX(-50%); font-size: 22px; letter-spacing: 3px; opacity: 0; transition: opacity .25s; }
    #hud-toast.show { opacity: 1; }
    #hud-toast.good { color: #a5ffb0; }
    #hud-toast.bad { color: #ff7a6b; }
    #hud-gauge { position: absolute; bottom: 22px; left: 24px; width: 200px; height: 200px; }
    #hud-players { margin-top: 12px; font-size: 12px; color: #9aa1c4; letter-spacing: 1px; }
    #hud-players div { display: flex; justify-content: flex-end; gap: 14px; line-height: 1.9; }
    #hud-players div span { color: #7c86ad; min-width: 56px; text-align: right; }
    #hud-players div.me { color: #ffd28a; }
    #hud-players div.me span { color: #ffd28a; }
    #hud-help { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #62688a; letter-spacing: 1px; }

    /* --- the traffic stop: Bram at your window, chat across the bottom half --- */
    #cop-chat { position: fixed; inset: 0; z-index: 25; font-family: var(--pix);
      background: #05060d url('/cop.png') center top / cover no-repeat; image-rendering: pixelated; }
    /* his face sits high in the frame — fade the lower half so the chat reads over it */
    #cop-chat::after { content: ''; position: absolute; inset: 55% 0 0 0; background: linear-gradient(to bottom, rgba(4,5,12,0) 0%, rgba(4,5,12,.55) 55%, rgba(4,5,12,.8) 100%); pointer-events: none; }
    #cop-frame { position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%); width: min(620px, 92vw);
      background: rgba(6,8,18,.9); border: 1px solid #2a2f4a; pointer-events: auto; z-index: 1; }
    #cop-head { display: flex; justify-content: space-between; padding: 7px 10px; border-bottom: 1px solid #2a2f4a; font-size: 10px; letter-spacing: 2px; color: #9aa1c4; }
    #cop-log { max-height: 24vh; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 7px; }
    .cop-line { font-size: 14px; line-height: 1.55; max-width: 78%; }
    .cop-line.bram { color: #e8e3d2; }
    .cop-line.you { color: #7fd4ff; text-align: right; align-self: flex-end; }
    .cop-mood { font-size: 11px; color: #8a8fb0; font-style: italic; margin-top: -3px; }
    #cop-input { width: 100%; box-sizing: border-box; background: #0a0d1f; border: none; border-top: 1px solid #2a2f4a; color: #cfd2e8; padding: 12px 14px; font-family: var(--pix); font-size: 13px; outline: none; }
    #cop-input:disabled { color: #4a4f6a; }
    #cop-banner { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; font-size: 26px; letter-spacing: 5px; text-shadow: 2px 2px 0 #000; }
    #cop-banner.show { display: flex; }
    #cop-banner.release { color: #a5ffb0; }
    #cop-banner.arrest { color: #ff7a6b; background: rgba(0,0,0,.72); animation: cop-flash .5s steps(2) 1; }
    @keyframes cop-flash { 0% { background: #fff; } 100% { background: rgba(0,0,0,.72); } }
    /* pin bar: how long he's had you cornered. Screen-space on your own HUD —
       it only shows when YOU are the one being pulled over. */
    #cop-pin { position: fixed; top: 8%; left: 50%; transform: translateX(-50%); width: min(360px, 56vw);
      z-index: 24; display: none; pointer-events: none; font-family: var(--pix); text-align: center; }
    #cop-pin u { display: block; font-size: 11px; letter-spacing: 3px; color: #ff7a6b; text-decoration: none;
      text-shadow: 1px 1px 0 #000; margin-bottom: 5px; }
    #cop-pin div { height: 12px; border: 1px solid #2a2f4a; background: rgba(6,8,18,.85); padding: 1px; }
    #cop-pin i { display: block; height: 100%; width: 0%; transition: width .08s linear; }

    #debug-panel { position: fixed; top: 12px; left: 12px; width: 320px; max-height: 92vh; overflow-y: auto; background: rgba(6,8,18,.92); border: 1px solid #2a2f4a; padding: 10px 12px; font-family: var(--pix); font-size: 11px; color: #aeb3d0; z-index: 20; }
    #debug-panel .dbg-title { color: #ffd28a; margin-bottom: 8px; letter-spacing: 2px; }
    #debug-panel .dbg-row { display: grid; grid-template-columns: 110px 1fr 44px; gap: 6px; align-items: center; margin: 3px 0; }
    #debug-panel input[type=range] { width: 100%; accent-color: #b8743a; height: 12px; }
    #debug-panel span { text-align: right; color: #7fd4ff; }

    #join { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px; background: #05060d url('/join-bg.png') center / cover no-repeat; font-family: var(--pix); z-index: 30; }
    #join .spacer { flex: 0 0 30vh; } /* the artwork carries the title — push the form below it */
    #join .row { display: flex; gap: 10px; align-items: center; color: #aeb3d0; font-size: 13px; }
    #join input { background: #0a0d1f; border: 1px solid #2a2f4a; color: #cfd2e8; padding: 8px 10px; font-family: var(--pix); font-size: 14px; width: 180px; }
    /* car picker: swatch chip + name, two rows of four */
    #join .cars { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: min(560px, 92vw); }
    #join .cars button { display: flex; align-items: center; gap: 8px; padding: 8px 10px; cursor: pointer;
      background: rgba(6,8,18,.82); border: 1px solid #2a2f4a; color: #9aa1c4;
      font-family: var(--pix); font-size: 11px; letter-spacing: 1px; }
    #join .cars button i { width: 14px; height: 14px; flex: 0 0 14px; border: 1px solid rgba(0,0,0,.6); }
    #join .cars button:hover { border-color: #5a3f82; color: #cbb8ef; }
    #join .cars button.sel { border-color: #ffd28a; color: #ffd28a; background: rgba(53,32,79,.75); }
    #join #start { background: #35204f; color: #cbb8ef; border: 1px solid #5a3f82; padding: 12px 44px; font-family: var(--pix); font-size: 17px; letter-spacing: 4px; cursor: pointer; margin-top: 8px; }
    #join #start:hover { background: #4a2d71; color: #e6dcff; }
    #join .status { color: #62688a; font-size: 11px; height: 14px; }
  </style>
  <script type="module" crossorigin src="/assets/index-Jp39qHoF.js"></script>
</head>
<body>
  <canvas id="game"></canvas>
</body>
</html>
